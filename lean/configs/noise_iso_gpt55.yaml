# Noise-isolation sweep on GPT-5.5 in two modes — reasoning on vs off.
# Both arms use the same model id (`openai/gpt-5.5`); they differ only in
# `reasoning_effort` ("high" vs "none"). Display names "gpt-5.5-high" /
# "gpt-5.5-none" keep the row keys distinct for the resume + analyze paths.
#
# This isolates the *reasoning effect* from the model identity:
# do reasoning models behave qualitatively differently under context
# pollution than non-reasoning ones?
run_name: noise_iso_gpt55_v1

models:
  - provider: openai_compat
    model: "openai/gpt-5.5"
    display_name: "gpt-5.5-high"
    extra_params: {reasoning_effort: "high"}
  - provider: openai_compat
    model: "openai/gpt-5.5"
    display_name: "gpt-5.5-none"
    extra_params: {reasoning_effort: "none"}

theorems:
  source: replay_passing
  kind: random
  split: val
  limit: 30
  max_tactics: 5
  seed: 0                # same theorem set as the other noise_iso runs

k:
  strategy: last

rungs:
  - hint:2
  - hint:3
  - noise:3
  - hint:4
  - noise:4

n_rollouts: 1
temperature: 0.7
max_tokens: 8192        # generous for reasoning channel
dojo_timeout: 300

concurrent_gen: true
max_concurrency: 8
skip_trivial: true
theorem_workers: 4
