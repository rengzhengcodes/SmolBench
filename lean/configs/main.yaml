# Main experiment: 5-rung ladder along the no-leak → answer-conditional axis.
#
#   stepk:2 (= nohint)  full tactic state + tactics so far + theorem identity, no premise leak
#   hint:0              + names of premises used in the true next tactic
#   hint:1              + type signatures of those premises
#   hint:2              + full source (incl. proof body) of those premises
#   hint:3              + 1-hop premise dep closure (per-premise dep graph),
#                         each closure premise also rendered as full source incl. proof
#
# Models cover three configurations of interest:
#   - claude-sonnet-4.6        Anthropic dense, non-reasoning (PI compat path)
#   - gpt-5.5  (effort: high)  frontier reasoning ON
#   - gpt-5.5  (effort: none)  frontier reasoning OFF (same base as above)
#   - deepseek-v3.2 (high)     671B MoE, reasoning ON (V3.2 supports the toggle)
#   - deepseek-v3.2 (none)     671B MoE, reasoning OFF
run_name: main_v1

models:
  - {provider: openai_compat, model: "anthropic/claude-sonnet-4.6"}
  - provider: openai_compat
    model: "openai/gpt-5.5"
    display_name: "gpt-5.5-high"
    extra_params: {reasoning_effort: "high"}
  - provider: openai_compat
    model: "openai/gpt-5.5"
    display_name: "gpt-5.5-none"
    extra_params: {reasoning_effort: "none"}
  - provider: openai_compat
    model: "deepseek/deepseek-v3.2"
    display_name: "deepseek-v3.2-high"
    extra_params: {reasoning_effort: "high"}
  - provider: openai_compat
    model: "deepseek/deepseek-v3.2"
    display_name: "deepseek-v3.2-none"
    extra_params: {reasoning_effort: "none"}

theorems:
  source: replay_passing
  kind: random
  split: val
  limit: 30
  max_tactics: 5
  seed: 0                # same theorem set as the prior noise_iso runs

k:
  strategy: last

rungs:
  - stepk:2
  - hint:0
  - hint:1
  - hint:2
  - hint:3

n_rollouts: 1
temperature: 0.7
max_tokens: 8192
dojo_timeout: 300

concurrent_gen: true
max_concurrency: 8
skip_trivial: true
theorem_workers: 4
